<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>쿠팡 체크상품 견적서 생성기</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial, sans-serif; }

@media print {
  .no-print { display: none !important; }
  body { padding: 0; background: white; }
  .print-area { border: none; box-shadow: none; width: 100%; margin: 0; padding: 0; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid #000 !important; word-break: break-all; }
  .print-title { display: block !important; }
}

table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
th { background-color: #f2f2f2; text-align: center; font-weight: bold; }

.print-title {
  display: none;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}
</style>
</head>

<body class="bg-slate-50 p-4 md:p-8">

<div class="max-w-5xl mx-auto no-print">

<header class="mb-6">
  <h1 class="text-3xl font-extrabold flex items-center gap-3">
    🛒 쿠팡 체크상품 견적서 생성기
  </h1>
  <p class="text-slate-500 mt-2">
    쿠팡 장바구니에서 북마클릿을 누르면 자동으로 견적 생성됩니다.
  </p>
</header>

<!-- 설치 영역 -->
<div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
  <h2 class="text-lg font-bold mb-2">📌 북마클릿 설치</h2>

  <p class="text-sm mb-2">
    아래 버튼을 <b>북마크바로 드래그</b> 하세요
  </p>

  <p class="text-xs text-red-600 mb-3">
    ※ 북마크바 안 보이면 Ctrl + Shift + B
  </p>

  <a id="bookmarklet-btn"
     class="inline-block px-4 py-2 bg-blue-600 text-white rounded-lg font-bold cursor-move">
     👉 북마크 추가 (드래그)
  </a>

  <div class="mt-4 text-xs bg-slate-100 p-3 rounded break-all" id="bookmarklet-code"></div>
</div>

<!-- 선택 영역 -->
<div id="selection-area" class="bg-white p-6 rounded-2xl shadow-sm border mb-8 hidden">

  <h2 class="text-lg font-bold mb-4">가져온 체크 상품</h2>

  <table class="w-full text-sm mb-4">
    <thead class="bg-slate-800 text-white">
      <tr>
        <th>선택</th>
        <th>상품명</th>
        <th>수량</th>
        <th>단가</th>
      </tr>
    </thead>
    <tbody id="parsed-list"></tbody>
  </table>

</div>

</div>

<div id="print-area" class="max-w-4xl mx-auto bg-white p-6 shadow print-area">

<h2 class="text-xl font-bold mb-4">견적서</h2>

<table>
<thead>
<tr>
<th>상품명</th>
<th>수량</th>
<th>금액</th>
</tr>
</thead>
<tbody id="final-list"></tbody>
</table>

<div class="mt-4 font-bold">
총 금액: <span id="res-net">0</span>
</div>

</div>

<script>

// 🔥 이미 완성된 북마클릿 (네 코드 포함됨)
const BOOKMARKLET = `javascript:(()=>{try{
const APP_URL='https://kanggonbong.github.io/estimate-app/';
const APP_ORIGIN=new URL(APP_URL).origin;

const CHECKBOXES=[...document.querySelectorAll('input[type="checkbox"]')].filter(cb=>cb.checked);
const PRICE_RE=/([0-9][0-9,]{2,})\\s*원/g;
const NOISE_LINE=/^(Coupang|장바구니\\(\\d+\\)|장바구니|무료배송|로켓|내일|도착|새벽|와우|쿠팡|선택|삭제|변경|수량|옵션|구매|주문|배송|상품금액|총상품금액)$/i;
const NOISE_TEXT=/(할인 종료|남은 상품이 있어요|장바구니\\(|Coupang|쿠팡|총 주문금액|결제예정금액|주문하기|품절|추천|광고)/i;

const out=[];
const seen=new Set();

function cleanLines(text){
  return (text||'').split('\\n').map(v=>v.trim()).filter(Boolean);
}

function extractQty(lines){
  for(const line of lines){
    let m=line.match(/수량\\s*[:：]?\\s*(\\d+)/);
    if(m) return Math.max(1,parseInt(m[1],10));
  }
  return 1;
}

function pickName(lines){
  return lines.find(l=>l.length>6 && !PRICE_RE.test(l))||null;
}

CHECKBOXES.forEach(cb=>{
  const el=cb.closest('li')||cb.parentElement;
  const lines=cleanLines(el.innerText);

  const priceMatch=lines.join(' ').match(PRICE_RE);
  if(!priceMatch) return;

  const price=parseInt(priceMatch[0].replace(/[^0-9]/g,''),10);
  const name=pickName(lines);
  const qty=extractQty(lines);

  if(!name) return;

  const key=name+'_'+price;
  if(seen.has(key)) return;
  seen.add(key);

  out.push({name,price,qty,checked:true});
});

const newWin=window.open(APP_URL,'_blank');

setTimeout(()=>{
  newWin.postMessage({
    type:'COUPANG_CART_ITEMS',
    payload:out
  },'*');
},800);

}catch(e){alert('오류:'+e.message);}})();`;


// 버튼 연결
document.getElementById("bookmarklet-btn").href = BOOKMARKLET;
document.getElementById("bookmarklet-code").innerText = BOOKMARKLET;


// ====== 기존 기능 ======

let items = [];

function formatNumber(num){
  return new Intl.NumberFormat('ko-KR').format(num);
}

function setItems(newItems){
  items = newItems.map(it=>({
    name: it.name,
    price: Number(it.price),
    qty: Number(it.qty||1),
    checked: true
  }));

  document.getElementById('selection-area').classList.remove('hidden');
  render();
}

function render(){
  const list = document.getElementById('parsed-list');
  list.innerHTML = '';

  items.forEach((it,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" checked onchange="items[${i}].checked=this.checked;renderPreview()"></td>
      <td>${it.name}</td>
      <td><input type="number" value="${it.qty}" onchange="items[${i}].qty=this.value;renderPreview()"></td>
      <td><input type="number" value="${it.price}" onchange="items[${i}].price=this.value;renderPreview()"></td>
    `;
    list.appendChild(tr);
  });

  renderPreview();
}

function renderPreview(){
  const list = document.getElementById('final-list');
  list.innerHTML='';

  let total=0;

  items.filter(i=>i.checked).forEach(it=>{
    const sum = it.price * it.qty;
    total += sum;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${it.name}</td>
      <td>${it.qty}</td>
      <td>${formatNumber(sum)}</td>
    `;
    list.appendChild(tr);
  });

  document.getElementById('res-net').innerText = formatNumber(total);
}

// 메시지 수신
window.addEventListener('message', (event)=>{
  if(event.data?.type === 'COUPANG_CART_ITEMS'){
    setItems(event.data.payload);
  }
});

</script>

</body>
</html>
